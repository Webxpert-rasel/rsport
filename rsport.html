<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="referrer" content="no-referrer">
<title>R Sport – Watch Live Sports Online</title>
<meta name="description" content="Watch live sports, football, cricket, and TV channels online on R Sport. HD streaming anytime anywhere.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<style>
/* ─── RESET & TOKENS ─────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --cyan:#00e5ff;
  --cyan2:#00b8d9;
  --magenta:#e040fb;
  --green:#00e676;
  --red:#ff1744;
  --bg0:#03050a;
  --bg1:#07101a;
  --card:#0e1929;
  --card2:#132032;
  --border:#192d45;
  --border-glow:rgba(0,229,255,.18);
  --txt0:#e8f5ff;
  --txt1:#7ab0cc;
  --txt2:#2e4d68;
  --hdr:60px;
  --sidebar:340px;
  --r:12px;
}

html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg0);color:var(--txt0);min-height:100vh;overflow-x:hidden}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--cyan2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--magenta)}

body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9000}

/* ─── AMBIENT GLOWS ───────────────────────────── */
.glow-orb{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0;opacity:.07}
.glow-orb.a{width:500px;height:500px;top:-150px;left:-150px;background:var(--cyan)}
.glow-orb.b{width:400px;height:400px;bottom:-100px;right:-100px;background:var(--magenta)}

/* ─── HEADER ──────────────────────────────────── */
header{
  position:sticky;top:0;z-index:500;height:var(--hdr);
  background:rgba(3,5,10,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border-glow);
  display:flex;align-items:center;padding:0 clamp(12px,3vw,28px);gap:12px;
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-mark{width:42px;height:42px;flex-shrink:0;filter:drop-shadow(0 0 8px rgba(0,229,255,.5))}
.logo-name{font-family:'Orbitron',sans-serif;font-size:clamp(15px,3vw,20px);font-weight:900;letter-spacing:2px;color:var(--txt0);line-height:1}
.logo-name em{font-style:normal;background:linear-gradient(90deg,var(--cyan),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-spacer{flex:1}
.hdr-now{font-size:11px;color:var(--txt1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:min(200px,30vw);display:none}
@media(min-width:540px){.hdr-now{display:block}}

/* ─── APP SHELL ───────────────────────────────── */
.shell{display:flex;flex-direction:column;min-height:calc(100vh - var(--hdr))}
@media(min-width:960px){
  .shell{flex-direction:row;height:calc(100vh - var(--hdr));overflow:hidden}
}

/* ─── LEFT COLUMN ─────────────────────────────── */
.left-col{display:flex;flex-direction:column;flex:1;min-width:0}
@media(min-width:960px){.left-col{overflow-y:auto;overflow-x:hidden}}

/* ─── PLAYER ──────────────────────────────────── */
.player-wrap{
  position:relative;width:100%;background:#000;overflow:hidden;flex-shrink:0;
  aspect-ratio:16/9;
}
@media(min-width:960px){
  .player-wrap{aspect-ratio:unset;height:calc((100vw - var(--sidebar)) * 9/16);max-height:62vh}
}

/* Native video element */
#main-video{
  width:100%;height:100%;display:block;background:#000;
  position:absolute;inset:0;object-fit:contain;
}

/* Iframe fallback (for non-m3u8 channels) */
#main-iframe{
  position:absolute;inset:0;width:100%;height:100%;border:none;display:none;
}

/* Placeholder */
.player-placeholder{
  position:absolute;inset:0;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:radial-gradient(ellipse at 50% 50%,#0c1c30 0%,#03050a 70%);
  transition:opacity .3s;
}
.player-placeholder.hidden{opacity:0;pointer-events:none}
.ph-icon{
  width:66px;height:66px;border-radius:50%;border:2px solid var(--cyan);
  display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 0 24px rgba(0,229,255,.35),0 0 60px rgba(0,229,255,.12);
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ph-text{text-align:center;line-height:1.7}
.ph-text strong{display:block;font-family:'Orbitron',sans-serif;font-size:15px;color:var(--cyan);letter-spacing:2px;margin-bottom:4px}
.ph-text .tw{font-size:11px;letter-spacing:1.5px;color:var(--magenta)}
.ph-text .tw::after{content:'|';animation:cur .7s step-end infinite;color:var(--cyan)}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}

/* Loading spinner overlay */
.spinner-overlay{
  position:absolute;inset:0;z-index:3;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(3,5,10,.7);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.spinner-overlay.show{opacity:1;pointer-events:auto}
.spinner{
  width:44px;height:44px;border-radius:50%;
  border:3px solid rgba(0,229,255,.15);
  border-top-color:var(--cyan);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-label{font-size:11px;font-family:'Orbitron',sans-serif;letter-spacing:1.5px;color:var(--txt1)}

/* Error overlay */
.error-overlay{
  position:absolute;inset:0;z-index:4;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  background:rgba(3,5,10,.85);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.error-overlay.show{opacity:1;pointer-events:auto}
.error-icon{font-size:36px}
.error-msg{font-size:13px;color:var(--txt1);text-align:center;max-width:240px;line-height:1.6}
.retry-btn{
  margin-top:4px;padding:9px 20px;border-radius:8px;
  background:rgba(0,229,255,.1);border:1.5px solid rgba(0,229,255,.35);
  color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:1.5px;cursor:pointer;transition:all .2s;
}
.retry-btn:hover{background:rgba(0,229,255,.2);border-color:var(--cyan)}

/* ─── NOW BAR ─────────────────────────────────── */
.now-bar{
  display:flex;align-items:center;gap:10px;
  padding:9px clamp(12px,3vw,24px);
  background:rgba(0,229,255,.04);
  border-top:1px solid var(--border-glow);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.eq{display:flex;gap:2px;align-items:flex-end;height:16px;visibility:hidden}
.eq span{width:3px;border-radius:2px;background:linear-gradient(to top,var(--cyan),var(--magenta));animation:eq .7s ease-in-out infinite alternate}
.eq span:nth-child(1){height:5px;animation-delay:0s}
.eq span:nth-child(2){height:12px;animation-delay:.12s}
.eq span:nth-child(3){height:16px;animation-delay:.24s}
.eq span:nth-child(4){height:8px;animation-delay:.36s}
.eq span:nth-child(5){height:14px;animation-delay:.48s}
@keyframes eq{to{transform:scaleY(.2)}}
#now-title{flex:1;font-size:12px;font-weight:600;color:var(--txt0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.now-idle{flex:1;display:flex;justify-content:center}
.idle-bars{display:flex;align-items:center;gap:3px;height:18px}
.idle-bars span{width:3px;border-radius:2px;background:linear-gradient(to top,var(--cyan),var(--magenta));animation:ibr 1s ease-in-out infinite alternate;opacity:.4}
.idle-bars span:nth-child(1){height:4px;animation-delay:0s}
.idle-bars span:nth-child(2){height:9px;animation-delay:.1s}
.idle-bars span:nth-child(3){height:15px;animation-delay:.2s}
.idle-bars span:nth-child(4){height:18px;animation-delay:.3s}
.idle-bars span:nth-child(5){height:12px;animation-delay:.4s}
.idle-bars span:nth-child(6){height:16px;animation-delay:.5s}
.idle-bars span:nth-child(7){height:7px;animation-delay:.6s}
.idle-bars span:nth-child(8){height:11px;animation-delay:.7s}
@keyframes ibr{to{transform:scaleY(.15);opacity:.15}}

/* ─── FOOTER ──────────────────────────────────── */
footer{
  padding:14px 20px;text-align:center;font-size:11px;color:var(--txt2);
  border-top:1px solid var(--border);background:var(--bg1);
}
footer strong{color:var(--cyan)}

/* ─── SIDEBAR ─────────────────────────────────── */
.sidebar{
  display:flex;flex-direction:column;
  background:var(--bg1);border-top:1px solid var(--border);
}
@media(min-width:960px){
  .sidebar{
    width:var(--sidebar);min-width:var(--sidebar);
    border-top:none;border-left:1px solid var(--border);
    overflow:hidden;height:100%;
  }
}
@media(min-width:1200px){.sidebar{width:370px;min-width:370px}}
@media(min-width:1400px){.sidebar{width:400px;min-width:400px}}

.sb-head{
  display:flex;align-items:center;gap:10px;
  padding:13px clamp(12px,3vw,18px);
  border-bottom:1px solid var(--border-glow);
  background:rgba(0,229,255,.03);flex-shrink:0;
}
.sb-bar{width:4px;height:26px;background:linear-gradient(to bottom,var(--cyan),var(--magenta));border-radius:3px;box-shadow:0 0 8px rgba(0,229,255,.4);flex-shrink:0}
.sb-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt0);flex:1}
.sb-count{font-size:11px;font-weight:600;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.2);color:var(--cyan);border-radius:20px;padding:2px 10px}

.sb-search{padding:10px clamp(10px,2vw,16px);border-bottom:1px solid var(--border);flex-shrink:0}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;
  transition:border-color .2s,box-shadow .2s;
}
.search-box:focus-within{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,.1)}
.search-box input{flex:1;border:none;outline:none;background:transparent;font-family:'Inter',sans-serif;font-size:13px;color:var(--txt0)}
.search-box input::placeholder{color:var(--txt2)}
.search-box span{font-size:13px;color:var(--txt2);flex-shrink:0}

/* ─── CHANNEL LIST & CARDS ────────────────────── */
.ch-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px clamp(8px,2vw,14px);display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px;align-content:start}
@media(max-width:959px){.ch-list{display:flex;flex-wrap:wrap;max-height:none}}

.ch-card{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  padding:12px 6px 10px;
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);
  cursor:pointer;transition:transform .16s,border-color .16s,box-shadow .16s;
  position:relative;overflow:hidden;min-width:80px;
}
.ch-card:hover{border-color:rgba(0,229,255,.45);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,229,255,.12)}
.ch-card.active{
  border-color:var(--cyan);background:rgba(0,229,255,.07);
  box-shadow:0 0 0 1px var(--cyan),0 4px 24px rgba(0,229,255,.18);
}
.ch-card.active::after{content:'▶';position:absolute;top:5px;right:6px;font-size:8px;color:var(--cyan)}

.ch-logo-box{
  width:52px;height:52px;border-radius:10px;
  background:var(--card2);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  transition:border-color .16s,box-shadow .16s;flex-shrink:0;
}
.ch-card.active .ch-logo-box{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,229,255,.28)}
.ch-logo-box img{width:44px;height:44px;object-fit:contain;display:block}
.ch-logo-box .fallback{font-size:8px;font-weight:800;color:var(--txt2);text-align:center;padding:2px;line-height:1.2}
.ch-name{font-size:10px;font-weight:600;color:var(--txt1);text-align:center;line-height:1.3;word-break:break-word;max-width:100%}
.ch-card.active .ch-name{color:var(--cyan)}

.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;padding:36px 20px;gap:10px;color:var(--txt2);text-align:center}
.empty span{font-size:32px}
.empty p{font-size:12px;font-weight:600}

.skel{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:var(--r)}
@keyframes shim{to{background-position:-200% 0}}
</style>
</head>

let activeId = null;
let filtered = [...ALL_CHANNELS];
let hlsInstance = null;
let retryId = null;

const video    = document.getElementById('main-video');
const iframeEl = document.getElementById('main-iframe');
const ph       = document.getElementById('player-ph');
const spinnerO = document.getElementById('spinner-overlay');
const errorO   = document.getElementById('error-overlay');
const errorMsg = document.getElementById('error-msg');

// ─── PLAYER HELPERS ───────────────────────────
function showSpinner(){ spinnerO.classList.add('show'); errorO.classList.remove('show') }
function hideSpinner(){ spinnerO.classList.remove('show') }
function showError(msg){ errorO.classList.add('show'); spinnerO.classList.remove('show'); if(msg) errorMsg.textContent = msg }
function hideError(){ errorO.classList.remove('show') }
function hidePlaceholder(){ ph.classList.add('hidden') }

function destroyHls(){
  if(hlsInstance){ hlsInstance.destroy(); hlsInstance = null }
  video.src = '';
  video.style.display = 'none';
}
function hideIframe(){
  iframeEl.src = 'about:blank';
  iframeEl.style.display = 'none';
}

// ─── PLAY CHANNEL ─────────────────────────────
function playChannel(id){
  const ch = ALL_CHANNELS.find(c => c.id === id);
  if(!ch) return;
  activeId = id;
  retryId = id;

  hidePlaceholder();
  hideError();
  showSpinner();
  destroyHls();
  hideIframe();

  if(ch.type === 'hls'){
    video.style.display = 'block';
    iframeEl.style.display = 'none';

    if(Hls.isSupported()){
      hlsInstance = new Hls({
        enableWorker: true,
        lowLatencyMode: true,
        backBufferLength: 30,
        maxBufferLength: 20,
        maxMaxBufferLength: 40,
        liveSyncDurationCount: 3,
        liveMaxLatencyDurationCount: 6,
        fragLoadingTimeOut: 12000,
        manifestLoadingTimeOut: 10000,
        levelLoadingTimeOut: 10000,
        fragLoadingMaxRetry: 4,
        manifestLoadingMaxRetry: 3,
      });

      hlsInstance.loadSource(ch.url);
      hlsInstance.attachMedia(video);

      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        hideSpinner();
        video.play().catch(()=>{});
      });

      hlsInstance.on(Hls.Events.ERROR, (event, data) => {
        if(data.fatal){
          switch(data.type){
            case Hls.ErrorTypes.NETWORK_ERROR:
              // Try to recover
              hlsInstance.startLoad();
              setTimeout(()=>{ if(spinnerO.classList.contains('show')) showError('Network error — stream may be offline.') }, 8000);
              break;
            case Hls.ErrorTypes.MEDIA_ERROR:
              hlsInstance.recoverMediaError();
              break;
            default:
              showError('Stream error. The channel may be offline or the URL has changed.');
              break;
          }
        }
      });

    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      // Native HLS (Safari / iOS)
      video.src = ch.url;
      video.addEventListener('loadedmetadata', ()=>{ hideSpinner(); video.play().catch(()=>{}) }, {once:true});
      video.addEventListener('error', ()=>{ showError('Stream unavailable on this device.') }, {once:true});
    } else {
      showError('HLS not supported on this browser.');
    }

  } else {
    // Iframe path for non-m3u8 channels
    video.style.display = 'none';
    iframeEl.style.display = 'block';
    iframeEl.src = ch.url;
    // Hide spinner after a moment (can't detect iframe load state cross-origin)
    setTimeout(hideSpinner, 2500);
  }

  // Update now bar
  document.getElementById('now-idle').style.display = 'none';
  const nt = document.getElementById('now-title');
  nt.textContent = '▶ ' + ch.name; nt.style.display = 'block';
  document.getElementById('eq').style.visibility = 'visible';
  document.getElementById('hdr-now').textContent = '▶ ' + ch.name;

  if(window.innerWidth < 960) window.scrollTo({top:0,behavior:'smooth'});

  renderList();
}

function retryChannel(){
  if(retryId) playChannel(retryId);
}

// ─── BUILD CARD ───────────────────────────────
function buildCard(ch){
  const card = document.createElement('div');
  card.className = 'ch-card' + (ch.id === activeId ? ' active' : '');
  card.dataset.id = ch.id;

  const logoBox = document.createElement('div');
  logoBox.className = 'ch-logo-box';
  if(ch.logo){
    const img = document.createElement('img');
    img.src = ch.logo; img.alt = ch.name; img.loading = 'lazy';
    img.onerror = function(){ this.style.display='none'; logoBox.querySelector('.fallback').style.display='flex' };
    const fb = document.createElement('div');
    fb.className = 'fallback'; fb.style.display = 'none';
    fb.textContent = ch.name.substring(0,5);
    logoBox.append(img, fb);
  } else {
    const fb = document.createElement('div');
    fb.className = 'fallback'; fb.textContent = ch.name.substring(0,5);
    logoBox.append(fb);
  }

  const name = document.createElement('div');
  name.className = 'ch-name'; name.textContent = ch.name;

  card.append(logoBox, name);
  card.addEventListener('click', () => playChannel(ch.id));
  return card;
}

// ─── RENDER ───────────────────────────────────
function renderList(){
  const list = document.getElementById('ch-list');
  document.getElementById('sb-count').textContent = filtered.length;
  if(!filtered.length){
    list.innerHTML = '<div class="empty"><span>📺</span><p>No channels found</p></div>';
    return;
  }
  const frag = document.createDocumentFragment();
  filtered.forEach(ch => frag.appendChild(buildCard(ch)));
  list.innerHTML = '';
  list.appendChild(frag);
}

// ─── SEARCH ───────────────────────────────────
let st;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(st);
  st = setTimeout(()=>{
    const q = e.target.value.toLowerCase().trim();
    filtered = q ? ALL_CHANNELS.filter(c => c.name.toLowerCase().includes(q)) : [...ALL_CHANNELS];
    renderList();
  }, 170);
});

// ─── TYPEWRITER ───────────────────────────────
(function(){
  const msgs = ['SELECT A CHANNEL','HD STREAM READY','CHOOSE & ENJOY'];
  let m=0,c=0,del=false;
  const el = document.getElementById('tw');
  if(!el) return;
  function t(){
    const s=msgs[m];
    if(!del){el.textContent=s.substring(0,++c);if(c===s.length){del=true;setTimeout(t,1900);return}}
    else{el.textContent=s.substring(0,--c);if(c===0){del=false;m=(m+1)%msgs.length;setTimeout(t,400);return}}
    setTimeout(t, del?45:90);
  }
  t();
})();

// ─── INIT ─────────────────────────────────────
renderList();

// ─── SECURITY ─────────────────────────────────
document.addEventListener('contextmenu', e=>e.preventDefault());
document.addEventListener('keydown', e=>{
  if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&e.key==='u')) e.preventDefault();
});
</script>
