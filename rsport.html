<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rsport | World Cup Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #030712;
        --card: #0b0f19;
        --accent: #2563eb;
        --cyan: #06b6d4;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --border: rgba(255,255,255,0.06);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        background-image:
          radial-gradient(ellipse at 20% 0%, rgba(37,99,235,0.18) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 100%, rgba(6,182,212,0.10) 0%, transparent 55%);
        background-attachment: fixed;
      }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 99px; }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: clamp(16px, 4vw, 36px) 16px;
        display: flex;
        flex-direction: column;
        gap: clamp(16px, 3vw, 28px);
        min-height: 100vh;
        justify-content: center;
      }

      /* ── Header ── */
      .header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        text-align: center;
        animation: fadeSlideIn 0.7s ease;
      }

      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .logo-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--accent), var(--cyan));
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 16px rgba(37,99,235,0.30);
        transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      }

      .logo-icon:hover {
        transform: scale(1.08) rotate(3deg);
      }

      .logo-svg { width: 22px; height: 22px; fill: #fff; }

      .brand {
        font-size: clamp(22px, 5vw, 28px);
        font-weight: 900;
        letter-spacing: -0.02em;
        background: linear-gradient(to right, #fff, #93c5fd);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .badge {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        background: linear-gradient(135deg, #059669, #10b981);
        color: #fff;
        padding: 3px 8px;
        border-radius: 99px;
        vertical-align: middle;
        margin-left: 6px;
      }

      .title {
        font-size: clamp(22px, 4.5vw, 44px);
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .subtitle {
        color: var(--muted);
        font-size: clamp(13px, 2vw, 16px);
        max-width: 500px;
      }

      /* ── Main Grid ── */
      .main-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: clamp(16px, 3vw, 28px);
      }

      @media (min-width: 768px) {
        .main-grid {
          grid-template-columns: 2fr 1fr;
        }
      }

      /* ── Player Card ── */
      .player-card {
        background: #000;
        border: 1px solid var(--border);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      }

      .player-inner {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
      }

      .status-tag {
        position: absolute;
        top: 14px;
        left: 14px;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 7px;
        background: rgba(0,0,0,0.72);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.10);
        padding: 6px 13px;
        border-radius: 99px;
        font-size: 11px;
        font-weight: 600;
      }

      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #10b981;
        animation: pulse 1.6s infinite;
      }

      .status-dot.offline { background: #ef4444; animation: none; }
      .status-dot.loading { background: #f59e0b; }

      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.5); }
        50%      { box-shadow: 0 0 0 9px rgba(16,185,129,0); }
      }

      /* ── Sidebar ── */
      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .section-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .channels-panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .channel-btn {
        display: flex;
        align-items: center;
        gap: 14px;
        background: rgba(255,255,255,0.02);
        border: 1px solid var(--border);
        padding: 14px;
        border-radius: 14px;
        cursor: pointer;
        text-align: left;
        color: inherit;
        transition: all 0.2s ease;
        width: 100%;
        font-family: inherit;
      }

      .channel-btn:hover {
        background: #111827;
        border-color: rgba(255,255,255,0.14);
        transform: translateX(3px);
      }

      .channel-btn.active {
        background: linear-gradient(135deg, rgba(37,99,235,0.18), rgba(6,182,212,0.06));
        border-color: var(--accent);
        box-shadow: 0 0 16px rgba(37,99,235,0.12);
      }

      .ch-icon {
        width: 46px;
        height: 46px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        border: 1px solid rgba(255,255,255,0.06);
      }

      .channel-btn.active .ch-icon {
        border-color: var(--accent);
      }

      .ch-info { flex: 1; min-width: 0; }

      .ch-name {
        font-size: 14px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .ch-desc {
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .ch-tag {
        display: inline-block;
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 2px 6px;
        border-radius: 4px;
        background: rgba(37,99,235,0.15);
        color: #93c5fd;
        margin-top: 4px;
      }

      .channel-btn.active .ch-tag {
        background: rgba(16,185,129,0.15);
        color: #34d399;
      }

      /* ── Footer ── */
      .footer {
        text-align: center;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: var(--muted);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .footer a {
        color: var(--cyan);
        text-decoration: none;
      }

      .footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="container">

      <!-- Header -->
      <header class="header">
        <div class="logo-group">
          <div class="logo-icon">
            <svg class="logo-svg" viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.26-.81-1-1.4-1.9-1.4h-1v-3c0-.55-.45-1-1-1h-6v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
          </div>
          <span class="brand">rsport<span class="badge">Live</span></span>
        </div>
      </header>

      <!-- Main Grid -->
      <main class="main-grid">

        <!-- Video Player -->
        <section class="player-card">
          <div class="player-inner">
            <video id="video" controls autoplay playsinline poster="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1200&q=80"></video>
            <div class="status-tag">
              <span class="status-dot loading" id="status-dot"></span>
              <span id="status-label">Connecting</span>
            </div>
          </div>
        </section>

        <!-- Channel Picker -->
        <aside class="sidebar">
          <div class="channels-panel">
            <p class="section-title">📺 Live Channels</p>
            <div id="channel-list"></div>
          </div>
        </aside>

      </main>

      <!-- Footer -->
      <footer class="footer">
        <p>© 2026 rsport. Streams belong to their respective rights holders. Use responsibly.</p>
      </footer>
    </div>

    <!-- Multi-Format Playback Engines (Hls.js & Shaka Player) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js" crossorigin="anonymous"></script>
    <script>
      const channels = [
        {
          name: "World Feed (HD)",
          desc: "Global international sports stream • English HLS",
          url: "https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8",
          tag: "HD",
          iconBg: "#2563eb",
          iconSvg: '<svg width="22" height="22" viewBox="0 0 24 24"><rect width="24" height="24" fill="#2563eb" rx="6"/><circle cx="12" cy="12" r="7" fill="none" stroke="#fff" stroke-width="2.2"/><circle cx="12" cy="12" r="3" fill="#38bdf8"/></svg>',
          format: "hls"
        },
        {
          name: "Toffee FIFA 2026",
          desc: "Premium FIFA World Cup 2026 feed • HD HLS",
          url: "https://toffee-seg.smartdev.workers.dev/manifest?url=https%3A%2F%2Fprod-cdn01-live.toffeelive.com%2Flive%2FFIFA-2026%2F0%2Fmaster_3500.m3u8&cookie=%22Expires%3D1781372565~_GO%3DGenerated~URLPrefix%3DaHR0cHM6Ly9wcm9kLWNkbjAxLWxpdmUudG9mZmVlbGl2ZS5jb20~Signature%3DAaPNU3dPJyjCWl9uqYUhckb0fdg7RP-kLcuSqR5V5pjo62P2P2iQTcyTjpVuuIIP9NLcdW0VA1Z9_6NVwI2H36GyJbAC%22",
          tag: "2026",
          iconBg: "#7c3aed",
          iconSvg: '<svg width="22" height="22" viewBox="0 0 24 24"><rect width="24" height="24" fill="#7c3aed" rx="6"/><circle cx="12" cy="12" r="7" fill="none" stroke="#fff" stroke-width="2"/><path d="M12 5l2 4 4 1-3 3 1 4-4-2-4 2 1-4-3-3 4-1z" fill="#fbbf24"/></svg>',
          format: "hls"
        },
        {
          name: "English Live Feed (DRM)",
          desc: "Direct official stream with English commentary • ClearKey DASH",
          url: "https://live.vrtcdn.be/groupd/live/0761024f-37fe-4254-bc37-e95d7c62b2d1/live.isml/.mpd",
          tag: "DRM",
          iconBg: "#db2777",
          iconSvg: '<svg width="22" height="22" viewBox="0 0 24 24"><rect width="24" height="24" fill="#db2777" rx="6"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" fill="#fff"/></svg>',
          format: "dash",
          drm: {
            clearKeys: {
              "893bc63340876605f52886a42e0ccce5": "d6c46d2d691056fbd091bf1f01b21a91"
            }
          }
        }
      ];

      const videoEl    = document.getElementById("video");
      const statusDot  = document.getElementById("status-dot");
      const statusLabel= document.getElementById("status-label");
      const listEl     = document.getElementById("channel-list");

      let activeUrl = channels[0].url;
      let hls;
      let shakaPlayer;

      function setStatus(state) {
        statusDot.className = "status-dot " +
          (state === "Live" ? "" : state === "Connecting" ? "loading" : "offline");
        statusLabel.textContent = state;
      }

      async function play(channel) {
        activeUrl = channel.url;
        
        // 1. Clean up HLS
        if (hls) { hls.destroy(); hls = null; }
        
        // 2. Clean up Shaka
        if (shakaPlayer) {
          try {
            await shakaPlayer.destroy();
          } catch(e) {}
          shakaPlayer = null;
        }

        setStatus("Connecting");

        if (channel.format === "dash" && window.shaka) {
          // --- Shaka Playback for ClearKey DRM DASH ---
          window.shaka.polyfill.installAll();
          
          if (!window.shaka.Player.isBrowserSupported()) {
            setStatus("Unsupported");
            return;
          }

          shakaPlayer = new window.shaka.Player(videoEl);
          
          if (channel.drm) {
            shakaPlayer.configure({
              drm: {
                clearKeys: channel.drm.clearKeys
              }
            });
          }

          shakaPlayer.addEventListener("error", (e) => {
            console.error("Shaka Player Error:", e.detail);
            setStatus("Offline");
          });

          try {
            await shakaPlayer.load(channel.url);
            setStatus("Live");
          } catch(e) {
            console.error("Shaka Load Error:", e);
            setStatus("Offline");
          }

        } else {
          // --- HLS Playback ---
          if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
            videoEl.src = channel.url;
            videoEl.onloadeddata = () => setStatus("Live");
            videoEl.onerror      = () => setStatus("Offline");
          } else if (window.Hls && window.Hls.isSupported()) {
            hls = new window.Hls({ enableWorker: true, lowLatencyMode: true, backBufferLength: 60 });
            hls.loadSource(channel.url);
            hls.attachMedia(videoEl);
            hls.on(window.Hls.Events.MANIFEST_PARSED, () => setStatus("Live"));
            hls.on(window.Hls.Events.ERROR, (_, d) => { if (d.fatal) setStatus("Offline"); });
          } else {
            setStatus("Unsupported");
          }
        }

        highlightActive();
      }

      function highlightActive() {
        document.querySelectorAll(".channel-btn").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.url === activeUrl);
          const tag = btn.querySelector(".ch-tag");
          if (tag) tag.textContent = btn.dataset.url === activeUrl ? "Watching" : btn.dataset.tag;
        });
      }

      function render() {
        listEl.innerHTML = "";
        channels.forEach(ch => {
          const btn = document.createElement("button");
          btn.className = "channel-btn " + (ch.url === activeUrl ? "active" : "");
          btn.dataset.url = ch.url;
          btn.dataset.tag = ch.tag;
          btn.innerHTML = `
            <div class="ch-icon" style="background:${ch.iconBg}">${ch.iconSvg}</div>
            <div class="ch-info">
              <div class="ch-name">${ch.name}</div>
              <div class="ch-desc">${ch.desc}</div>
              <span class="ch-tag">${ch.url === activeUrl ? "Watching" : ch.tag}</span>
            </div>
          `;
          btn.addEventListener("click", () => play(ch));
          listEl.appendChild(btn);
        });
      }

      render();
      play(channels[0]);
    </script>
  </body>
</html>
