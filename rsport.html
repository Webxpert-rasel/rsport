<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>R Sport - Live TV</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --accent: #ff2d55;
  --accent2: #ff6030;
  --accent-glow: rgba(255,45,85,0.3);
  --bg: #0a0e14;
  --bg2: #111720;
  --bg3: #171f2b;
  --surface: #1a2232;
  --surface2: #212d40;
  --border: #1e2d42;
  --text: #e8f0fe;
  --text2: #8899bb;
  --text3: #4a5a78;
  --header-bg: #080c12;
  --url-bg: #080c12;
}

body.light-mode {
  --accent: #e0002e;
  --accent2: #cc4000;
  --accent-glow: rgba(224,0,46,0.2);
  --bg: #eef2f8;
  --bg2: #e4eaf4;
  --bg3: #d8e2f0;
  --surface: #ffffff;
  --surface2: #f0f4fc;
  --border: #c8d4e8;
  --text: #1a2540;
  --text2: #4a5f88;
  --text3: #8899bb;
  --header-bg: #0d1525;
  --url-bg: #0d1525;
}

body {
  font-family: 'Exo 2', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  transition: background 0.3s, color 0.3s;
}

/* HEADER */
header {
  background: var(--header-bg);
  padding: 11px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 200;
  border-bottom: 1px solid rgba(0,212,170,0.15);
  box-shadow: 0 2px 20px rgba(0,0,0,0.4);
}

.app-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  box-shadow: 0 0 12px var(--accent-glow);
}

.app-name {
  flex: 1;
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.app-name span {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* NIGHT MODE TOGGLE */
.mode-toggle {
  width: 36px; height: 36px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
  flex-shrink: 0;
}

.mode-toggle:active { transform: scale(0.9); }

.live-pill {
  background: linear-gradient(90deg, #ff2d55, #ff6030);
  color: white;
  font-size: 10px;
  font-weight: 800;
  padding: 5px 9px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  gap: 5px;
  letter-spacing: 1.5px;
  font-family: 'Rajdhani', sans-serif;
  box-shadow: 0 0 10px rgba(255,45,85,0.35);
}

.live-dot {
  width: 6px; height: 6px;
  background: #fff;
  border-radius: 50%;
  animation: blink 1s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* PLAYER */
.player-section {
  background: #000;
  position: relative;
}

video {
  width: 100%;
  aspect-ratio: 16/9;
  display: block;
  background: #000;
}

.player-overlay {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.75);
  flex-direction: column;
  gap: 12px;
  font-size: 13px;
  color: var(--text2);
  text-align: center;
  padding: 20px;
}

.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to{ transform:rotate(360deg); } }

/* CONTROLS */
.controls {
  background: var(--bg2);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.ctrl-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text2);
  padding: 8px 14px;
  border-radius: 7px;
  font-family: 'Exo 2', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}

.ctrl-btn:active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

.now-info {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  flex: 1;
  padding: 0 8px;
}

.eq-bars {
  display: flex;
  gap: 2px;
  align-items: flex-end;
  height: 14px;
}

.eq-bar {
  width: 3px;
  background: linear-gradient(to top, var(--accent), var(--accent2));
  border-radius: 2px;
  animation: eq 0.8s ease-in-out infinite alternate;
}

.eq-bar:nth-child(1){ height:5px; animation-delay:0s; }
.eq-bar:nth-child(2){ height:10px; animation-delay:0.15s; }
.eq-bar:nth-child(3){ height:14px; animation-delay:0.3s; }
.eq-bar:nth-child(4){ height:7px; animation-delay:0.45s; }
.eq-bar:nth-child(5){ height:11px; animation-delay:0.6s; }

@keyframes eq { to{ transform:scaleY(0.25); } }

#now-title-ctrl {
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 130px;
}

/* SEARCH */
.search-wrap {
  padding: 12px 16px 8px;
  background: var(--bg);
}

.search-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 10px 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-box:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.search-box input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: 'Exo 2', sans-serif;
  font-size: 14px;
  color: var(--text);
}

.search-box input::placeholder { color: var(--text3); }

/* COUNTRY SECTION */
.country-section {
  background: var(--bg);
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--border);
}

.section-title-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}

.accent-bar {
  width: 4px; height: 18px;
  background: linear-gradient(to bottom, var(--accent), var(--accent2));
  border-radius: 3px;
  flex-shrink: 0;
}

.section-title-row span {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text2);
  font-family: 'Rajdhani', sans-serif;
}

.country-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 4px;
}

.country-row::-webkit-scrollbar { display: none; }

.cnt-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
  cursor: pointer;
}

.cnt-flag-circle {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--surface);
  border: 2.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  transition: all 0.18s;
  position: relative;
}

.cnt-btn.active .cnt-flag-circle {
  border-color: var(--accent);
  background: rgba(0,212,170,0.1);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.cnt-btn.active .cnt-flag-circle::after {
  content: '✓';
  position: absolute;
  bottom: -3px; right: -3px;
  width: 16px; height: 16px;
  background: var(--accent);
  border-radius: 50%;
  border: 2px solid var(--bg);
  font-size: 9px;
  color: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  line-height: 12px;
  text-align: center;
}

.cnt-name {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  max-width: 54px;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.cnt-btn.active .cnt-name { color: var(--accent); }

/* CATEGORY TABS */
.tabs-wrap {
  background: var(--bg2);
  padding: 10px 16px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}

.tabs-wrap::-webkit-scrollbar { display: none; }

.tab {
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text2);
  padding: 7px 14px;
  border-radius: 20px;
  font-family: 'Exo 2', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.tab .cnt { font-size: 10px; color: var(--text3); transition: color 0.15s; }
.tab.active {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-color: transparent;
  color: #000;
  font-weight: 800;
  box-shadow: 0 2px 10px var(--accent-glow);
}
.tab.active .cnt { color: rgba(0,0,0,0.6); }

/* GRID HEADER */
.grid-hdr {
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
}

.grid-hdr-title {
  font-size: 13px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: 1px;
  flex: 1;
  font-family: 'Rajdhani', sans-serif;
  text-transform: uppercase;
}

.grid-hdr-count {
  font-size: 12px;
  color: var(--text3);
  font-weight: 600;
}

/* CHANNEL GRID */
.ch-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 0 16px 24px;
  background: var(--bg);
}

.ch-card {
  background: var(--surface);
  border-radius: 10px;
  padding: 14px 8px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  transition: all 0.15s;
  position: relative;
  animation: fadeUp 0.25s ease both;
}

@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.ch-card:active { transform: scale(0.95); }

.ch-card.playing {
  border-color: var(--accent);
  background: rgba(0,212,170,0.08);
  box-shadow: 0 0 0 1px var(--accent), 0 4px 16px var(--accent-glow);
}

.on-air-tag {
  position: absolute;
  top: 0; left: 8px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  color: #000;
  font-size: 7px;
  font-weight: 900;
  padding: 2px 7px;
  border-radius: 0 0 6px 6px;
  letter-spacing: 1px;
  font-family: 'Rajdhani', sans-serif;
  display: none;
}

.ch-card.playing .on-air-tag { display: block; }

.logo-circle {
  width: 60px; height: 60px;
  border-radius: 14px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: border-color 0.15s;
}

.ch-card.playing .logo-circle {
  border-color: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
}

.ch-logo { width: 50px; height: 50px; object-fit: contain; }

.ch-fallback {
  font-size: 10px;
  font-weight: 800;
  color: var(--text3);
  text-align: center;
  padding: 2px;
}

.ch-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  text-align: center;
  line-height: 1.3;
  word-break: break-word;
}

.ch-card.playing .ch-label { color: var(--accent); }

/* skeleton */
.skel-card {
  background: var(--surface);
  border-radius: 10px;
  padding: 14px 8px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
}

.skel {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius: 6px;
}

@keyframes shimmer { to{ background-position:-200% 0; } }

.empty-state {
  grid-column: 1/-1;
  text-align: center;
  padding: 50px 20px;
  color: var(--text3);
}

.empty-state .ei { font-size: 40px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; font-weight: 700; }

/* URL BAR */
.url-bar {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: var(--url-bg);
  border-top: 1px solid rgba(0,212,170,0.15);
  padding: 10px 16px 16px;
  z-index: 300;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
}

.url-row {
  display: flex;
  gap: 8px;
}

.url-row input {
  flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 9px 14px;
  border-radius: 8px;
  font-family: 'Exo 2', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}

.url-row input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.url-row input::placeholder { color: var(--text3); }

.url-play-btn {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  color: #000;
  border: none;
  padding: 9px 18px;
  border-radius: 8px;
  font-family: 'Exo 2', sans-serif;
  font-weight: 800;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 2px 10px var(--accent-glow);
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="app-icon">📡</div>
  <div class="app-name">R <span>Sport</span></div>
  <div class="header-right">
    <div class="mode-toggle" id="mode-toggle" title="Toggle light/dark mode">🌙</div>
  </div>
</header>

<!-- PLAYER -->
<div class="player-section">
  <video id="video" controls autoplay playsinline></video>
  <div class="player-overlay" id="player-overlay">
    <div class="spinner" id="spinner"></div>
    <div id="overlay-msg"></div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button class="ctrl-btn" id="btn-prev">⏮ Prev</button>
  <div class="now-info">
    <div class="eq-bars">
      <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
      <div class="eq-bar"></div><div class="eq-bar"></div>
    </div>
    <div id="now-title-ctrl">Select a channel</div>
  </div>
  <button class="ctrl-btn" id="btn-next">Next ⏭</button>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="search" placeholder="Search channels...">
  </div>
</div>

<!-- COUNTRY PICKER -->
<div class="country-section">
  <div class="section-title-row">
    <div class="accent-bar"></div>
    <span>🌍 Browse by Country</span>
  </div>
  <div class="country-row" id="country-row">
    <div style="display:flex;gap:10px;align-items:center;padding:4px 0">
      <div style="width:52px;height:52px;border-radius:50%;background:var(--surface);animation:shimmer 1.2s infinite" class="skel"></div>
      <div style="width:52px;height:52px;border-radius:50%;background:var(--surface);animation:shimmer 1.2s infinite" class="skel"></div>
      <div style="width:52px;height:52px;border-radius:50%;background:var(--surface);animation:shimmer 1.2s infinite" class="skel"></div>
      <div style="width:52px;height:52px;border-radius:50%;background:var(--surface);animation:shimmer 1.2s infinite" class="skel"></div>
    </div>
  </div>
</div>

<!-- CATEGORY TABS -->
<div class="tabs-wrap" id="tabs-wrap"></div>

<!-- GRID HEADER -->
<div class="grid-hdr">
  <div class="accent-bar"></div>
  <div class="grid-hdr-title" id="grid-title">BANGLADESH CHANNELS</div>
  <div class="grid-hdr-count" id="grid-count"></div>
</div>

<!-- GRID -->
<div class="ch-grid" id="ch-grid">
  <div class="skel-card"><div class="skel" style="width:60px;height:60px;border-radius:16px"></div><div class="skel" style="width:70%;height:10px"></div></div>
  <div class="skel-card"><div class="skel" style="width:60px;height:60px;border-radius:16px"></div><div class="skel" style="width:55%;height:10px"></div></div>
  <div class="skel-card"><div class="skel" style="width:60px;height:60px;border-radius:16px"></div><div class="skel" style="width:65%;height:10px"></div></div>
  <div class="skel-card"><div class="skel" style="width:60px;height:60px;border-radius:16px"></div><div class="skel" style="width:60%;height:10px"></div></div>
  <div class="skel-card"><div class="skel" style="width:60px;height:60px;border-radius:16px"></div><div class="skel" style="width:75%;height:10px"></div></div>
  <div class="skel-card"><div class="skel" style="width:60px;height:60px;border-radius:16px"></div><div class="skel" style="width:50%;height:10px"></div></div>
</div>



<script>
let allStreams=[], allChannels={}, allCountries={};
let activeHls=null, filteredList=[], currentIndex=-1;
let activeCountry='BD', activeCategory='', currentCard=null;

const CAT_ICONS={
  news:'📰',sports:'⚽',movies:'🎬',entertainment:'🎭',
  music:'🎵',kids:'🧸',documentary:'🎞️',cooking:'🍳',
  travel:'✈️',business:'💼',weather:'🌤️',religious:'🕌',
  general:'📡',auto:'🚗',legislative:'🏛️',shop:'🛍️',
  series:'📺',animation:'🎨',education:'📚'
};

// NIGHT MODE TOGGLE
const modeBtn = document.getElementById('mode-toggle');
let isLight = false;
modeBtn.addEventListener('click', () => {
  isLight = !isLight;
  document.body.classList.toggle('light-mode', isLight);
  modeBtn.textContent = isLight ? '🌙' : '☀️';
});

async function loadData(){
  try {
    const [s,c,co]=await Promise.all([
      fetch('https://iptv-org.github.io/api/streams.json').then(r=>r.json()),
      fetch('https://iptv-org.github.io/api/channels.json').then(r=>r.json()),
      fetch('https://iptv-org.github.io/api/countries.json').then(r=>r.json()),
    ]);
    c.forEach(x=>allChannels[x.id]=x);
    co.forEach(x=>allCountries[x.code]=x);
    allStreams=s.filter(x=>x.url&&x.url.includes('.m3u8'));
    buildCountryRow(c);
    buildTabs(c);
    renderGrid();
  } catch(e){
    document.getElementById('ch-grid').innerHTML='<div class="empty-state"><div class="ei">😢</div><p>Failed to load. Check connection.</p></div>';
  }
}

function buildCountryRow(channels){
  const cntCount={};
  channels.forEach(c=>{ if(c.country) cntCount[c.country]=(cntCount[c.country]||0)+1; });

  const sorted=Object.entries(cntCount)
    .sort((a,b)=>{ if(a[0]==='BD')return -1; if(b[0]==='BD')return 1; return b[1]-a[1]; })
    .slice(0,50);

  const row=document.getElementById('country-row');
  row.innerHTML='';

  const allBtn=mkCountryBtn('🌍','All','');
  row.appendChild(allBtn);

  sorted.forEach(([code])=>{
    const cnt=allCountries[code]; if(!cnt) return;
    const btn=mkCountryBtn(cnt.flag||'🏳️', cnt.name.length>8?cnt.name.slice(0,8)+'…':cnt.name, code);
    row.appendChild(btn);
    if(code==='BD'){
      setTimeout(()=>btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}),600);
    }
  });
}

function mkCountryBtn(flag, name, code){
  const btn=document.createElement('div');
  btn.className='cnt-btn'+(activeCountry===code?' active':'');
  btn.dataset.code=code;
  btn.innerHTML=`<div class="cnt-flag-circle">${flag}</div><div class="cnt-name">${name}</div>`;
  btn.addEventListener('click',()=>{
    activeCountry=code;
    activeCategory='';
    document.querySelectorAll('.cnt-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    const first=document.querySelector('.tab');
    if(first) first.classList.add('active');
    renderGrid();
  });
  return btn;
}

function buildTabs(channels){
  const catCount={};
  channels.forEach(c=>(c.categories||[]).forEach(cat=>{ catCount[cat]=(catCount[cat]||0)+1; }));
  const wrap=document.getElementById('tabs-wrap');
  const allT=mkTab('All','',allStreams.length,true); wrap.appendChild(allT);
  Object.entries(catCount).sort((a,b)=>b[1]-a[1]).slice(0,14).forEach(([cat,count])=>{
    wrap.appendChild(mkTab(capitalize(cat),cat,count,false));
  });
}

function mkTab(label,cat,count,active){
  const t=document.createElement('div');
  t.className='tab'+(active?' active':'');
  t.innerHTML=`${CAT_ICONS[cat]||'📺'} ${label} <span class="cnt">${count}</span>`;
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    activeCategory=cat;
    renderGrid();
  });
  return t;
}

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  return allStreams.filter(s=>{
    const ch=allChannels[s.channel]||{};
    const title=(s.title||ch.name||'').toLowerCase();
    if(q&&!title.includes(q)) return false;
    if(activeCountry&&ch.country!==activeCountry) return false;
    if(activeCategory&&!(ch.categories||[]).includes(activeCategory)) return false;
    return true;
  });
}

function renderGrid(){
  filteredList=getFiltered().slice(0,300);
  const grid=document.getElementById('ch-grid');
  const cnt=allCountries[activeCountry];
  const cntName=cnt?cnt.name:'All Countries';
  const flag=cnt?cnt.flag+' ':'';
  const catLabel=activeCategory?' · '+capitalize(activeCategory).toUpperCase():'';
  document.getElementById('grid-title').textContent=flag+(activeCountry?cntName.toUpperCase():activeCategory?capitalize(activeCategory).toUpperCase()+' CHANNELS':'ALL CHANNELS')+catLabel;
  document.getElementById('grid-count').textContent=filteredList.length+' ch';

  if(!filteredList.length){
    grid.innerHTML='<div class="empty-state"><div class="ei">📺</div><p>No channels found</p></div>';
    return;
  }

  grid.innerHTML=filteredList.map((s,i)=>{
    const ch=allChannels[s.channel]||{};
    const name=esc(s.title||ch.name||'TV');
    const logo=ch.id?`https://iptv-org.github.io/iptv/channels/${ch.id}.png`:'';
    const delay=Math.min(i*0.02,0.5);
    const logoHtml=logo
      ?`<img class="ch-logo" src="${logo}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt=""><div class="ch-fallback" style="display:none">${name.substring(0,5)}</div>`
      :`<div class="ch-fallback">${name.substring(0,5)}</div>`;
    return `<div class="ch-card" style="animation-delay:${delay}s" data-i="${i}">
      <div class="on-air-tag">ON AIR</div>
      <div class="logo-circle">${logoHtml}</div>
      <div class="ch-label">${name}</div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.ch-card').forEach((card,i)=>{
    card.addEventListener('click',()=>selectChannel(i,card));
  });
}

function selectChannel(i,cardEl){
  currentIndex=i;
  if(currentCard) currentCard.classList.remove('playing');
  currentCard=cardEl;
  cardEl.classList.add('playing');
  cardEl.scrollIntoView({behavior:'smooth',block:'nearest'});
  const s=filteredList[i];
  const ch=allChannels[s.channel]||{};
  document.getElementById('now-title-ctrl').textContent='▶ '+(s.title||ch.name||'Unknown');
  showLoading();
  startHls(s.url);
  window.scrollTo({top:0,behavior:'smooth'});
}

function startHls(url){
  const video=document.getElementById('video');
  if(activeHls){activeHls.destroy();activeHls=null;}
  video.src='';
  if(Hls.isSupported()){
    const hls=new Hls({enableWorker:false});
    activeHls=hls;
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{hideOverlay();video.play().catch(()=>{});});
    hls.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal)showError();});
  } else if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src=url;
    video.onloadedmetadata=()=>{hideOverlay();video.play().catch(()=>{});};
    video.onerror=showError;
  } else showError();
}

function showLoading(){
  const o=document.getElementById('player-overlay');
  o.style.display='flex';
  document.getElementById('spinner').style.display='block';
  document.getElementById('overlay-msg').textContent='';
}
function hideOverlay(){document.getElementById('player-overlay').style.display='none';}
function showError(){
  const o=document.getElementById('player-overlay');
  o.style.display='flex';
  document.getElementById('spinner').style.display='none';
  document.getElementById('overlay-msg').textContent='⚠️ Stream unavailable — try another channel';
}

document.getElementById('btn-prev').addEventListener('click',()=>{
  if(currentIndex>0){const cards=document.querySelectorAll('.ch-card');selectChannel(currentIndex-1,cards[currentIndex-1]);}
});
document.getElementById('btn-next').addEventListener('click',()=>{
  if(currentIndex<filteredList.length-1){const cards=document.querySelectorAll('.ch-card');selectChannel(currentIndex+1,cards[currentIndex+1]);}
});


let ft;
document.getElementById('search').addEventListener('input',()=>{clearTimeout(ft);ft=setTimeout(renderGrid,250);});

function capitalize(s){return s?s[0].toUpperCase()+s.slice(1):'';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

loadData();
</script>
</body>
</html>
