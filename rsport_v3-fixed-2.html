          btn.dataset.status = "live";
          badge.className = "ch-status-badge live";
          badge.innerHTML = '<span class="ch-status-dot"></span>LIVE';
          return;
        }

        try {
          if (ch.format === "iframe") {
            btn.dataset.status = "live";
            badge.className = "ch-status-badge live";
            badge.innerHTML = '<span class="ch-status-dot"></span>LIVE';
            return;
          }

          const controller = new AbortController();
          const timer = setTimeout(() => controller.abort(), 6000);
          await fetch(ch.url, {
            method: "HEAD",
            signal: controller.signal,
            mode: "no-cors"
          });
          clearTimeout(timer);
          btn.dataset.status = "live";
          badge.className = "ch-status-badge live";
          badge.innerHTML = '<span class="ch-status-dot"></span>LIVE';
        } catch(e) {
          btn.dataset.status = "offline";
          badge.className = "ch-status-badge offline";
          badge.innerHTML = '<span class="ch-status-dot"></span>OFFLINE';
        }
      }

      // Stagger checks so we don't fire all at once
      channels.forEach((ch, i) => {
        setTimeout(() => {
          const btn = document.querySelector(`.channel-btn[data-url="${CSS.escape(ch.url)}"]`);
          checkChannelStatus(ch, btn);
        }, i * 400);
      });
    </script>
  </body>
</html>
