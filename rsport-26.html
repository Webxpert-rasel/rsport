      // Match length assumed ~2 hours for "live/finished" determination
      const MATCH_DURATION_MS = 2 * 60 * 60 * 1000;

      function flagImg(code) {
        if (!code) return '<span class="flag" style="font-size:14px">🏳️</span>';
        return `<img class="flag" src="https://flagcdn.com/24x18/${code}.png" srcset="https://flagcdn.com/48x36/${code}.png 2x" alt="" />`;
      }

      function getActiveMatches() {
        const now = new Date();
        // Drop matches that have already finished (kickoff + duration < now)
        return matches.filter(m => (new Date(m.dt).getTime() + MATCH_DURATION_MS) > now.getTime());
      }

      let activeDay = null;

      function renderSchedule() {
        const upcoming = getActiveMatches();
        const days = [...new Set(upcoming.map(m => m.date))];

        if (!activeDay || !days.includes(activeDay)) {
          activeDay = days[0] || null;
        }

        dayTabsEl.innerHTML = "";
        days.forEach(day => {
          const tab = document.createElement("button");
          tab.className = "day-tab " + (day === activeDay ? "active" : "");
          tab.textContent = day;
          tab.addEventListener("click", () => { activeDay = day; renderSchedule(); });
          dayTabsEl.appendChild(tab);
        });

        matchListEl.innerHTML = "";

        if (!days.length) {
          matchListEl.innerHTML = '<p style="font-size:12px;color:var(--muted);padding:20px;text-align:center">All group stage matches have finished.</p>';
          return;
        }

        const now = new Date();
        upcoming.filter(m => m.date === activeDay).forEach(m => {
          const start = new Date(m.dt).getTime();
          const end = start + MATCH_DURATION_MS;
          const isLive = now.getTime() >= start && now.getTime() < end;

          const card = document.createElement("div");
          card.className = "match-card";
          card.innerHTML = `
            <div class="match-card-top">
              <span class="match-time">${m.time}</span>
              <span class="match-time-tag${isLive ? " live" : ""}">${isLive ? "🔴 Live" : "BST"}</span>
            </div>
            <div class="match-vs">
              <div class="match-team">
                ${flagImg(m.c1)}
                <span class="match-team-name">${m.t1}</span>
              </div>
              <span class="vs-sep">VS</span>
              <div class="match-team">
                ${flagImg(m.c2)}
                <span class="match-team-name">${m.t2}</span>
              </div>
            </div>
            <div class="match-venue">📍 ${m.venue}</div>
          `;
          matchListEl.appendChild(card);
        });
      }

      renderSchedule();
      // Refresh every minute so finished matches drop off automatically
      setInterval(renderSchedule, 60 * 1000);
    </script>

      let activeUrl = channels[0].url;

      let shakaPlayer;

function setStatus(state) {}

      function showVideo() {
        videoEl.style.display = "block";
        iframeEl.style.display = "none";
        iframeEl.src = "";
      }

      function showIframe(url) {
        videoEl.style.display = "none";
        iframeEl.style.display = "block";
        iframeEl.src = url;
        setStatus("Live");
      }

      async function play(channel) {
        activeUrl = channel.url;

        // Clean up HLS
        if (hls) { hls.destroy(); hls = null; }

        // Clean up Shaka
        if (shakaPlayer) {
          try { await shakaPlayer.destroy(); } catch(e) {}
          shakaPlayer = null;
        }

        // Handle iframe format
        if (channel.format === "iframe") {
          showIframe(channel.url);
          highlightActive();
          return;
        }

        showVideo();
        setStatus("Connecting");

        if (channel.format === "dash" && window.shaka) {
          window.shaka.polyfill.installAll();
          
          if (!window.shaka.Player.isBrowserSupported()) {
            setStatus("Unsupported");
            return;
          }

          shakaPlayer = new window.shaka.Player(videoEl);
          
          if (channel.drm) {
            shakaPlayer.configure({
              drm: {
                clearKeys: channel.drm.clearKeys
              }
            });
          }

          shakaPlayer.addEventListener("error", (e) => {
            console.error("Shaka Player Error:", e.detail);
            setStatus("Offline");
          });

          try {
            await shakaPlayer.load(channel.url);
            setStatus("Live");
          } catch(e) {
            console.error("Shaka Load Error:", e);
            setStatus("Offline");
          }

        } else {
          if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
            videoEl.src = channel.url;
            videoEl.onloadeddata = () => setStatus("Live");
            videoEl.onerror      = () => setStatus("Offline");
          } else if (window.Hls && window.Hls.isSupported()) {
            hls = new window.Hls({ enableWorker: true, lowLatencyMode: true, backBufferLength: 60 });
            hls.loadSource(channel.url);
            hls.attachMedia(videoEl);
            hls.on(window.Hls.Events.MANIFEST_PARSED, () => setStatus("Live"));
            hls.on(window.Hls.Events.ERROR, (_, d) => { if (d.fatal) setStatus("Offline"); });
          } else {
            setStatus("Unsupported");
          }
        }

        highlightActive();
      }

      function highlightActive() {
        document.querySelectorAll(".channel-btn").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.url === activeUrl);
          const tag = btn.querySelector(".ch-tag");
          if (tag) tag.textContent = btn.dataset.url === activeUrl ? "Watching" : btn.dataset.tag;
        });
      }

      function render() {
        listEl.innerHTML = "";
        channels.forEach(ch => {
          const btn = document.createElement("button");
          btn.className = "channel-btn " + (ch.url === activeUrl ? "active" : "");
          btn.dataset.url = ch.url;
